name: Build and Release MicaPDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build x64 Release
      run: dotnet publish -c Release -r win-x64 -p:Platform=x64 --self-contained false -p:PublishSingleFile=false
      
    - name: Build x86 Release
      run: dotnet publish -c Release -r win-x86 -p:Platform=x86 --self-contained false -p:PublishSingleFile=false
      
    - name: Build ARM64 Release
      run: dotnet publish -c Release -r win-arm64 -p:Platform=ARM64 --self-contained false -p:PublishSingleFile=false
      
    - name: Create Release Folder
      run: |
        New-Item -ItemType Directory -Force -Path "Release"
      shell: pwsh
      
    - name: Create Installation Instructions
      run: |
        @"
        MicaPDF - Modern PDF Viewer for Windows
        ========================================

        Installation Instructions:
        
        1. Download the appropriate installer for your system:
           - MicaPDF-Setup-x64.exe (for 64-bit Windows - most common)
           - MicaPDF-Setup-x86.exe (for 32-bit Windows)
           - MicaPDF-Setup-ARM64.exe (for ARM64 Windows devices)
        
        2. Run the installer
           - The installer will check if .NET 8 Desktop Runtime is installed
           - If not installed, you'll have the option to download and install it automatically
        
        3. Features:
           - Modern Mica translucent background
           - High-quality PDF rendering
           - Advanced zoom (up to 500%)
           - Page navigation with keyboard shortcuts
           - Pen annotation support with eraser
           - Touch and mouse pan/drag
           - Save annotated pages as images
           - Drag & drop PDF files
           - Double-page view mode
           - Page offset support for textbooks (filename pattern: book_+5.pdf)
           - Double-page alignment mode (filename pattern: book_+d.pdf)
        
        4. Usage:
           - Open PDFs by dragging them onto the app window or via command line
           - Use the side menu for all controls
           - Enable pen mode to draw annotations
           - Save annotated pages with "Save with Annotations"
           - For textbooks, name files with offset (e.g., "math_+20.pdf")
           - Use _+d suffix for double-page alignment mode
        
        Requirements:
        - Windows 10 version 1809 (build 17763) or later
        - Windows 11 recommended for best Mica effect
        - .NET 8 Desktop Runtime (installer can download it for you)
        
        "@ | Out-File -FilePath "Release\INSTALL.txt" -Encoding UTF8
      shell: pwsh
           - Double-click the .msix file
           - Click "Install" in the installer dialog
           - The app will be installed automatically
        
        3. The app will handle .pdf file associations automatically
        
        4. Features:
           - Modern Mica translucent background
           - High-quality PDF rendering
           - Advanced zoom (up to 500%)
           - Page navigation with keyboard shortcuts
           - Pen annotation support
           - Touch and mouse pan/drag
           - Save annotated pages as images
           - Drag & drop PDF files
           - Page offset support for textbooks (filename pattern: book_+5.pdf)
        
        5. Usage:
           - Open PDFs by dragging them onto the app window
           - Use the side menu for all controls
           - Enable pen mode to draw annotations
           - Save annotated pages with "Save with Annotations"
           - For textbooks, name files with offset (e.g., "math_+20.pdf" shows page 1 as page 20)
        
        Requirements:
        - Windows 10 version 1903 (build 19041) or later
        - Windows 11 recommended for best Mica effect
        - .NET 8 Desktop Runtime (will be prompted to install if missing)
        
        "@ | Out-File -FilePath "Release\INSTALL.txt" -Encoding UTF8
      shell: pwsh
      
    - name: Create README
      run: |
        @"
        # MicaPDF

        A modern, beautiful PDF viewer for Windows with translucent Mica background effect.

        ## Features

        - 🎨 **Modern UI**: Beautiful Mica translucent background that blends with your desktop
        - 📄 **High Quality**: High-definition PDF rendering (2x resolution)
        - 🔍 **Advanced Zoom**: Zoom from 50% to 500%
        - ✏️ **Annotations**: Draw and write on PDFs with pen support
        - ✏️ **Annotations**: Draw and write on PDFs with pen support
        - 💾 **Save Annotated**: Save your annotated pages as PNG images
        - 🖱️ **Touch & Mouse**: Full touch and mouse support with pan/drag
        - ⌨️ **Keyboard Shortcuts**: Navigate pages with Enter key
        - 📂 **Drag & Drop**: Drop PDF files directly on the app
        - 🎯 **File Association**: Set as default PDF reader
        - 📖 **Page Offset**: Support for textbooks with custom page numbering

        ## System Requirements

        - Windows 10 (build 17763) or later
        - Windows 11 recommended for best visual experience
        - .NET 8 Desktop Runtime

        ## Download

        Download the latest installer from the [Releases](../../releases) page.

        ## Installation

        1. Download the appropriate installer for your system
        2. Run the installer
        3. The installer will check if .NET 8 is installed and offer to download it
        4. Enjoy!

        ## Building from Source

        ``````bash
        git clone https://github.com/TCDev69/MicaPDF.git
        cd MicaPDF
        dotnet build -c Release -p:Platform=x64
        ``````

        ## License

        MIT License - See LICENSE file for details

        "@ | Out-File -FilePath "Release\README.md" -Encoding UTF8
      shell: pwsh
      
    - name: Install Inno Setup
      run: |
        choco install innosetup -y
      shell: pwsh
      
    - name: Create x64 Installer Script
      run: |
        @"
        #define MyAppName "MicaPDF"
        #define MyAppVersion "1.1.0"
        #define MyAppPublisher "MicaPDF"
        #define MyAppURL "https://github.com/TCDev69/MicaPDF"
        #define MyAppExeName "MicaPDF.exe"
        #define DotNetInstallerURL "https://download.visualstudio.microsoft.com/download/pr/4d6cbbf4-002a-4575-a2e5-e7920c0cd6eb/1e12ca0e0c74e5e9fb15c7d09784d1b5/windowsdesktop-runtime-8.0.11-win-x64.exe"

        [Setup]
        AppId={{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}
        AppName={#MyAppName}
        AppVersion={#MyAppVersion}
        AppPublisher={#MyAppPublisher}
        AppPublisherURL={#MyAppURL}
        AppSupportURL={#MyAppURL}
        AppUpdatesURL={#MyAppURL}
        DefaultDirName={autopf}\{#MyAppName}
        DefaultGroupName={#MyAppName}
        AllowNoIcons=yes
        OutputDir=Release
        OutputBaseFilename=MicaPDF-Setup-x64
        Compression=lzma2
        SolidCompression=yes
        WizardStyle=modern
        ArchitecturesAllowed=x64
        ArchitecturesInstallIn64BitMode=x64
        PrivilegesRequired=lowest

        [Languages]
        Name: "english"; MessagesFile: "compiler:Default.isl"

        [Tasks]
        Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked
        Name: "downloadnet8"; Description: "Download and install .NET 8 Desktop Runtime (required if not already installed)"; GroupDescription: "Additional options:"; Flags: checkablealone

        [Files]
        Source: "bin\x64\Release\net8.0-windows10.0.22621.0\win-x64\publish\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

        [Icons]
        Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
        Name: "{group}\{cm:UninstallProgram,{#MyAppName}}"; Filename: "{uninstallexe}"
        Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

        [Code]
        var
          DownloadPage: TDownloadWizardPage;

        function OnDownloadProgress(const Url, FileName: String; const Progress, ProgressMax: Int64): Boolean;
        begin
          if Progress = ProgressMax then
            Log(Format('Successfully downloaded %s to %s', [Url, FileName]));
          Result := True;
        end;

        function IsDotNet8Installed: Boolean;
        var
          ResultCode: Integer;
        begin
          Result := Exec('dotnet', '--list-runtimes', '', SW_HIDE, ewWaitUntilTerminated, ResultCode) and (ResultCode = 0);
        end;

        procedure InitializeWizard;
        begin
          DownloadPage := CreateDownloadPage(SetupMessage(msgWizardPreparing), SetupMessage(msgPreparingDesc), @OnDownloadProgress);
        end;

        function NextButtonClick(CurPageID: Integer): Boolean;
        var
          DotNetInstaller: String;
          ResultCode: Integer;
        begin
          Result := True;
          
          if CurPageID = wpReady then begin
            if IsTaskSelected('downloadnet8') and not IsDotNet8Installed then begin
              DownloadPage.Clear;
              DotNetInstaller := ExpandConstant('{tmp}\dotnet8-desktop-runtime.exe');
              DownloadPage.Add('{#DotNetInstallerURL}', 'dotnet8-desktop-runtime.exe', '');
              DownloadPage.Show;
              try
                try
                  DownloadPage.Download;
                  Result := True;
                  
                  if FileExists(DotNetInstaller) then begin
                    if MsgBox('Do you want to install .NET 8 Desktop Runtime now?' + #13#10 + 'This is required to run MicaPDF.', mbConfirmation, MB_YESNO) = IDYES then begin
                      Exec(DotNetInstaller, '/install /quiet /norestart', '', SW_SHOW, ewWaitUntilTerminated, ResultCode);
                      if ResultCode = 0 then
                        MsgBox('.NET 8 Desktop Runtime installed successfully!', mbInformation, MB_OK)
                      else
                        MsgBox('Failed to install .NET 8. You may need to install it manually.', mbError, MB_OK);
                    end;
                  end;
                except
                  if DownloadPage.AbortedByUser then begin
                    Result := False;
                  end else begin
                    MsgBox('Failed to download .NET 8 installer. You can download it manually from microsoft.com', mbError, MB_OK);
                  end;
                end;
              finally
                DownloadPage.Hide;
              end;
            end;
          end;
        end;

        [Run]
        Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent

        [Registry]
        Root: HKCU; Subkey: "Software\Classes\.pdf\OpenWithProgids"; ValueType: string; ValueName: "MicaPDF.Document"; ValueData: ""; Flags: uninsdeletevalue
        Root: HKCU; Subkey: "Software\Classes\MicaPDF.Document"; ValueType: string; ValueName: ""; ValueData: "PDF Document"; Flags: uninsdeletekey
        Root: HKCU; Subkey: "Software\Classes\MicaPDF.Document\DefaultIcon"; ValueType: string; ValueName: ""; ValueData: "{app}\{#MyAppExeName},0"
        Root: HKCU; Subkey: "Software\Classes\MicaPDF.Document\shell\open\command"; ValueType: string; ValueName: ""; ValueData: """{app}\{#MyAppExeName}"" ""%1"""
        "@ | Out-File -FilePath "installer-x64.iss" -Encoding UTF8
      shell: pwsh
