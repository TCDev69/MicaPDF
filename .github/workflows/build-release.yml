name: Build and Release MicaPDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build and Package x64 MSIX
      run: |
        msbuild /p:Configuration=Release /p:Platform=x64 /p:AppxPackageDir="AppPackages\x64\" /p:AppxBundle=Never /p:UapAppxPackageBuildMode=SideloadOnly /p:PublishReadyToRun=false
      shell: pwsh
      
    - name: Build and Package x86 MSIX
      run: |
        msbuild /p:Configuration=Release /p:Platform=x86 /p:AppxPackageDir="AppPackages\x86\" /p:AppxBundle=Never /p:UapAppxPackageBuildMode=SideloadOnly /p:PublishReadyToRun=false
      shell: pwsh
      
    - name: Build and Package ARM64 MSIX
      run: |
        msbuild /p:Configuration=Release /p:Platform=ARM64 /p:AppxPackageDir="AppPackages\ARM64\" /p:AppxBundle=Never /p:UapAppxPackageBuildMode=SideloadOnly /p:PublishReadyToRun=false
      shell: pwsh
      
    - name: Create Release Folder
      run: |
        New-Item -ItemType Directory -Force -Path "Release"
      shell: pwsh
      
    - name: List generated files for debugging
      run: |
        Write-Host "Checking AppPackages folder structure:"
        if (Test-Path "AppPackages") {
          Get-ChildItem -Path "AppPackages" -Recurse | Select-Object FullName
        } else {
          Write-Host "AppPackages folder does not exist"
        }
      shell: pwsh
      
    - name: Copy MSIX Packages to Release
      run: |
        $x64Msix = Get-ChildItem -Path "AppPackages\x64" -Filter "*.msix" -Recurse | Select-Object -First 1
        $x86Msix = Get-ChildItem -Path "AppPackages\x86" -Filter "*.msix" -Recurse | Select-Object -First 1
        $arm64Msix = Get-ChildItem -Path "AppPackages\ARM64" -Filter "*.msix" -Recurse | Select-Object -First 1
        
        if ($x64Msix) { Copy-Item -Path $x64Msix.FullName -Destination "Release\MicaPDF-x64.msix" -Force }
        if ($x86Msix) { Copy-Item -Path $x86Msix.FullName -Destination "Release\MicaPDF-x86.msix" -Force }
        if ($arm64Msix) { Copy-Item -Path $arm64Msix.FullName -Destination "Release\MicaPDF-ARM64.msix" -Force }
      shell: pwsh
      
    - name: Create Installation Instructions
      run: |
        @"
        MicaPDF - Modern PDF Viewer for Windows
        ========================================

        Installation Instructions:
        
        1. Download the appropriate MSIX package for your system:
           - MicaPDF-x64.msix (for 64-bit Windows - most common)
           - MicaPDF-x86.msix (for 32-bit Windows)
           - MicaPDF-ARM64.msix (for ARM64 Windows devices)
        
        2. Install the package:
           - Double-click the .msix file
           - Click "Install" in the installer dialog
           - The app will be installed automatically
        
        3. The app will handle .pdf file associations automatically
        
        4. Features:
           - Modern Mica translucent background
           - High-quality PDF rendering
           - Advanced zoom (up to 500%)
           - Page navigation with keyboard shortcuts
           - Pen annotation support
           - Touch and mouse pan/drag
           - Save annotated pages as images
           - Drag & drop PDF files
           - Page offset support for textbooks (filename pattern: book_+5.pdf)
        
        5. Usage:
           - Open PDFs by dragging them onto the app window
           - Use the side menu for all controls
           - Enable pen mode to draw annotations
           - Save annotated pages with "Save with Annotations"
           - For textbooks, name files with offset (e.g., "math_+20.pdf" shows page 1 as page 20)
        
        Requirements:
        - Windows 10 version 1903 (build 19041) or later
        - Windows 11 recommended for best Mica effect
        - .NET 8 Desktop Runtime (will be prompted to install if missing)
        
        "@ | Out-File -FilePath "Release\INSTALL.txt" -Encoding UTF8
      shell: pwsh
      
    - name: Create README
      run: |
        @"
        # MicaPDF

        A modern, beautiful PDF viewer for Windows with translucent Mica background effect.

        ## Features

        - 🎨 **Modern UI**: Beautiful Mica translucent background that blends with your desktop
        - 📄 **High Quality**: High-definition PDF rendering (2x resolution)
        - 🔍 **Advanced Zoom**: Zoom from 50% to 500%
        - ✏️ **Annotations**: Draw and write on PDFs with pen support
        - ✏️ **Annotations**: Draw and write on PDFs with pen support
        - 💾 **Save Annotated**: Save your annotated pages as PNG images
        - 🖱️ **Touch & Mouse**: Full touch and mouse support with pan/drag
        - ⌨️ **Keyboard Shortcuts**: Navigate pages with Enter key
        - 📂 **Drag & Drop**: Drop PDF files directly on the app
        - 🎯 **File Association**: Set as default PDF reader
        - 📖 **Page Offset**: Support for textbooks with custom page numbering

        ## System Requirements

        - Windows 10 (build 19041) or later
        - Windows 11 recommended for best visual experience
        - .NET 8 Desktop Runtime

        ## Download

        Download the latest MSIX package from the [Releases](../../releases) page.

        ## Installation

        1. Download the appropriate MSIX file for your system
        2. Double-click to install
        3. The app will automatically handle PDF file associations
        4. Enjoy!

        ## Building from Source

        ``````bash
        git clone https://github.com/TCDev69/MicaPDF.git
        cd MicaPDF
        msbuild /p:Configuration=Release /p:Platform=x64
        ``````

        ## License

        MIT License - See LICENSE file for details

        "@ | Out-File -FilePath "Release\README.md" -Encoding UTF8
      shell: pwsh
      
    - name: Upload Release Assets
      uses: actions/upload-artifact@v4
      with:
        name: MicaPDF-Release
        path: |
          Release/*.msix
          Release/*.txt
          Release/*.md
          
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Release/MicaPDF-x64.msix
          Release/MicaPDF-x86.msix
          Release/MicaPDF-ARM64.msix
          Release/INSTALL.txt
          Release/README.md
        body: |
          ## MicaPDF Release
          
          A modern PDF viewer with translucent Mica background for Windows.
          
          ### Downloads
          
          **MSIX Packages**
          - `MicaPDF-x64.msix` - MSIX Package for 64-bit systems
          - `MicaPDF-x86.msix` - MSIX Package for 32-bit systems
          - `MicaPDF-ARM64.msix` - MSIX Package for ARM64 devices
          
          Double-click the MSIX file to install. The app will automatically handle file associations.
          
          ### Requirements
          - Windows 10 build 19041 or later
          - .NET 8 Desktop Runtime (will prompt to install if missing)
          
          ### Features
          - Modern Mica translucent UI
          - High-quality PDF rendering
          - Pen annotations with eraser
          - Double-page view mode
          - Touch and mouse support
          - Page offset for textbooks (_+X.pdf naming pattern)
          - Set as default PDF reader
          
          ### Requirements
          - Windows 10 (build 17763) or later
          - Windows 11 recommended
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
