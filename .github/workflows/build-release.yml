name: Build and Release MicaPDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build x64 Release
      run: dotnet publish -c Release -r win-x64 -p:Platform=x64 --self-contained false -p:PublishSingleFile=false
      
    - name: Build x86 Release
      run: dotnet publish -c Release -r win-x86 -p:Platform=x86 --self-contained false -p:PublishSingleFile=false
      
    - name: Build ARM64 Release
      run: dotnet publish -c Release -r win-arm64 -p:Platform=ARM64 --self-contained false -p:PublishSingleFile=false
      
    - name: Create Release Folder
      run: |
        New-Item -ItemType Directory -Force -Path "Release"
      shell: pwsh
      
    - name: Create Installation Instructions
      run: |
        @"
        MicaPDF - Modern PDF Viewer for Windows
        ========================================

        Installation Instructions:
        
        1. Download the appropriate installer for your system:
           - MicaPDF-Setup-x64.exe (for 64-bit Windows - most common)
           - MicaPDF-Setup-x86.exe (for 32-bit Windows)
           - MicaPDF-Setup-ARM64.exe (for ARM64 Windows devices)
        
        2. Run the installer
           - The installer will check if .NET 8 Desktop Runtime is installed
           - If not installed, you'll have the option to download and install it automatically
        
        3. Features:
           - Modern Mica translucent background
           - High-quality PDF rendering
           - Advanced zoom (up to 500%)
           - Page navigation with keyboard shortcuts
           - Pen annotation support with eraser
           - Touch and mouse pan/drag
           - Save annotated pages as images
           - Drag & drop PDF files
           - Double-page view mode
           - Page offset support for textbooks (filename pattern: book_+5.pdf)
           - Double-page alignment mode (filename pattern: book_+d.pdf)
        
        4. Usage:
           - Open PDFs by dragging them onto the app window or via command line
           - Use the side menu for all controls
           - Enable pen mode to draw annotations
           - Save annotated pages with "Save with Annotations"
           - For textbooks, name files with offset (e.g., "math_+20.pdf")
           - Use _+d suffix for double-page alignment mode
        
        Requirements:
        - Windows 10 version 1809 (build 17763) or later
        - Windows 11 recommended for best Mica effect
        - .NET 8 Desktop Runtime (installer can download it for you)
        
        "@ | Out-File -FilePath "Release\INSTALL.txt" -Encoding UTF8
      shell: pwsh
           - Double-click the .msix file
           - Click "Install" in the installer dialog
           - The app will be installed automatically
        
        3. The app will handle .pdf file associations automatically
        
        4. Features:
           - Modern Mica translucent background
           - High-quality PDF rendering
           - Advanced zoom (up to 500%)
           - Page navigation with keyboard shortcuts
           - Pen annotation support
           - Touch and mouse pan/drag
           - Save annotated pages as images
           - Drag & drop PDF files
           - Page offset support for textbooks (filename pattern: book_+5.pdf)
        
        5. Usage:
           - Open PDFs by dragging them onto the app window
           - Use the side menu for all controls
           - Enable pen mode to draw annotations
           - Save annotated pages with "Save with Annotations"
           - For textbooks, name files with offset (e.g., "math_+20.pdf" shows page 1 as page 20)
        
        Requirements:
        - Windows 10 version 1903 (build 19041) or later
        - Windows 11 recommended for best Mica effect
        - .NET 8 Desktop Runtime (will be prompted to install if missing)
        
        "@ | Out-File -FilePath "Release\INSTALL.txt" -Encoding UTF8
      shell: pwsh
      
    - name: Create README
      run: |
        @"
        # MicaPDF

        A modern, beautiful PDF viewer for Windows with translucent Mica background effect.

        ## Features

        - 🎨 **Modern UI**: Beautiful Mica translucent background that blends with your desktop
        - 📄 **High Quality**: High-definition PDF rendering (2x resolution)
        - 🔍 **Advanced Zoom**: Zoom from 50% to 500%
        - ✏️ **Annotations**: Draw and write on PDFs with pen support
        - ✏️ **Annotations**: Draw and write on PDFs with pen support
        - 💾 **Save Annotated**: Save your annotated pages as PNG images
        - 🖱️ **Touch & Mouse**: Full touch and mouse support with pan/drag
        - ⌨️ **Keyboard Shortcuts**: Navigate pages with Enter key
        - 📂 **Drag & Drop**: Drop PDF files directly on the app
        - 🎯 **File Association**: Set as default PDF reader
        - 📖 **Page Offset**: Support for textbooks with custom page numbering

        ## System Requirements

        - Windows 10 (build 17763) or later
        - Windows 11 recommended for best visual experience
        - .NET 8 Desktop Runtime

        ## Download

        Download the latest installer from the [Releases](../../releases) page.

        ## Installation

        1. Download the appropriate installer for your system
        2. Run the installer
        3. The installer will check if .NET 8 is installed and offer to download it
        4. Enjoy!

        ## Building from Source

        ``````bash
        git clone https://github.com/TCDev69/MicaPDF.git
        cd MicaPDF
        dotnet build -c Release -p:Platform=x64
        ``````

        ## License

        MIT License - See LICENSE file for details

        "@ | Out-File -FilePath "Release\README.md" -Encoding UTF8
      shell: pwsh
      
    - name: Install Inno Setup
      run: |
        choco install innosetup -y
      shell: pwsh
      
    - name: Generate Installer Scripts
      run: |
        .\generate-installers.ps1
      shell: pwsh
      
    - name: Build Installers
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer-x64.iss
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer-x86.iss
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer-ARM64.iss
      shell: pwsh
      continue-on-error: true
      
    - name: Create Portable ZIP
      run: |
        Compress-Archive -Path "bin\x64\Release\net8.0-windows10.0.22621.0\win-x64\publish\*" -DestinationPath "Release\MicaPDF-Portable-x64.zip" -Force
        Compress-Archive -Path "bin\x86\Release\net8.0-windows10.0.22621.0\win-x86\publish\*" -DestinationPath "Release\MicaPDF-Portable-x86.zip" -Force
        Compress-Archive -Path "bin\ARM64\Release\net8.0-windows10.0.22621.0\win-arm64\publish\*" -DestinationPath "Release\MicaPDF-Portable-ARM64.zip" -Force
      shell: pwsh
      
    - name: Upload Release Assets
      uses: actions/upload-artifact@v4
      with:
        name: MicaPDF-Release
        path: |
          Release/*.exe
          Release/*.zip
          Release/*.txt
          Release/*.md
          
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Release/MicaPDF-Portable-x64.zip
          Release/MicaPDF-Portable-x86.zip
          Release/MicaPDF-Portable-ARM64.zip
          Release/MicaPDF-Setup-x64.exe
          Release/MicaPDF-Setup-x86.exe
          Release/MicaPDF-Setup-ARM64.exe
          Release/INSTALL.txt
          Release/README.md
        body: |
          ## MicaPDF v1.1.0 Release
          
          A modern PDF viewer with translucent Mica background for Windows.
          
          ### Downloads
          
          **Installer (Recommended)**
          - `MicaPDF-Setup-x64.exe` - Windows Installer for 64-bit systems
          - `MicaPDF-Setup-x86.exe` - Windows Installer for 32-bit systems
          - `MicaPDF-Setup-ARM64.exe` - Windows Installer for ARM64 devices
          
          The installer will automatically check for .NET 8 Desktop Runtime and offer to download/install it if needed.
          
          **Portable Versions**
          - `MicaPDF-Portable-x64.zip` - Portable version for 64-bit Windows
          - `MicaPDF-Portable-x86.zip` - Portable version for 32-bit Windows  
          - `MicaPDF-Portable-ARM64.zip` - Portable version for ARM64 Windows
          
          ### New Features in v1.1.0
          - 📖 Page offset support for textbooks (e.g., `book_+20.pdf`)
          - 📄 Double-page alignment mode (`book_+d.pdf`)
          - ✏️ Pen annotations now work in double-page mode
          - 🔧 .NET 8 auto-download option in installer
          
          ### Features
          - Modern Mica translucent UI
          - High-quality PDF rendering at 200% DPI
          - Pen annotations with eraser
          - Double-page view mode
          - Touch and mouse support
          - Set as default PDF reader
          
          ### Requirements
          - Windows 10 (build 17763) or later
          - Windows 11 recommended for best Mica effect
          - .NET 8 Desktop Runtime (installer can download it automatically)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
